{{ define "main" }}

<nav class="site-nav scrolled">
  <div class="site-nav__inner">
    <a class="site-nav__brand" href="{{ if eq .Lang "de" }}/{{ else }}/en/{{ end }}">maxlamm</a>
    <div class="site-nav__links">
      <a href="{{ if eq .Lang "de" }}/projects/{{ else }}/en/projects/{{ end }}">Work</a>
      <a href="{{ if eq .Lang "de" }}/#about{{ else }}/en/#about{{ end }}">About</a>
      <a href="{{ if eq .Lang "de" }}/#contact{{ else }}/en/#contact{{ end }}">Contact</a>
    </div>
  </div>
</nav>

<div class="archive-page">
  <h1>{{ .Title }}</h1>

  <div class="archive-grid">
    {{- range .Pages -}}
    <a class="archive-card" href="{{ .RelPermalink }}">
      {{- with .Params.thumbnail -}}
      <img src="{{ . }}" alt="{{ $.Title }}" loading="lazy">
      {{- end -}}
      <div class="archive-card__body">
        <h2 class="archive-card__title">{{ .Title }}</h2>
        <p class="archive-card__excerpt">{{ .Summary }}</p>
        <span class="archive-card__link">{{ $.Site.Language.Params.readMore }}</span>
      </div>
    </a>
    {{- end -}}
  </div>
</div>

{{ end }}
