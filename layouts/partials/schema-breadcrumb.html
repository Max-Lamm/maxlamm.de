{{- if and .IsPage (eq .Section "projects") -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ .Site.BaseURL }}{{ if eq .Lang "en" }}en/{{ end }}"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "Work",
      "item": "{{ .Site.BaseURL }}{{ if eq .Lang "en" }}en/{{ end }}work/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ .Title }}",
      "item": "{{ .Permalink }}"
    }
  ]
}
</script>
{{- end -}}
