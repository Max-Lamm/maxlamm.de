<footer class="site-footer">
  <div class="footer-logo">
    <a href="https://maxlamm.de"><img src="/images/logo.png" width="66px" alt="Logo"></a>
    <span class="footer-logo__text">{{ .Site.Params.logoText }}</span>
    <span class="footer-logo__sub">{{ .Site.Language.Params.subtitle }}</span>
  </div>

  <p class="footer-copyright">&copy; {{ now.Year }} {{ .Site.Params.author }}</p>

  <div class="footer-social">
    {{ with .Site.Params.instagram }}<a href="{{ . }}" target="_blank" rel="noopener" aria-label="Instagram">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
    </a>{{ end }}
    {{ with .Site.Params.linkedin }}<a href="{{ . }}" target="_blank" rel="noopener" aria-label="LinkedIn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
    </a>{{ end }}
    <a href="/contact/" aria-label="Email">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </a>
    {{ with .Site.Params.phone }}<a href="tel:{{ . }}" aria-label="Phone">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    </a>{{ end }}
  </div>

  <nav class="footer-nav">
    {{ range .Site.Menus.footer }}
      <a href="{{ .URL }}">{{ .Name }}</a>
    {{ end }}
    <!-- Language switch -->
    <!--{{ if eq $.Lang "de" }}
      <a class="lang-switch" href="/en/">🇬🇧 English</a>
    {{ else }}
      <a class="lang-switch" href="/">🇩🇪 Deutsch</a>
    {{ end }}-->
  </nav>
</footer>
